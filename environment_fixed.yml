name: ivtlr
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip

  # PyTorch CUDA stack (keep conda-managed CUDA)
  - pytorch=2.5.1
  - pytorch-cuda=12.1

  # CUDA compiler/toolchain for deepspeed builds (nvcc)
  - cuda-toolkit=12.1

  # PyAV deps via conda (avoid pip building from source)
  - ffmpeg=7.*
  - av 

  # (optional but often needed for builds)
  - compilers
  - ninja
  - pkg-config
  - cython

  - pip:
      - accelerate==1.6.0
      - addict==2.4.0
